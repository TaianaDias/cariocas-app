<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍔 Carioca's Sistema</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: Poppins, sans-serif; background: #0B0B0B; color: #fff; margin: 0; }
    header { background: #E8351A; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2rem; }
    .container { padding: 15px; max-width: 480px; margin: 0 auto; }
    .card { background: #161616; border-radius: 12px; padding: 20px; margin-bottom: 15px; }
    input, button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; box-sizing: border-box; font-family: Poppins, sans-serif; font-size: 0.95rem; }
    input { background: #222; color: #fff; }
    input::placeholder { color: #888; }
    button { background: #E8351A; color: #fff; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: #333; margin-top: 8px; }
    .hidden { display: none; }
    .error { color: #ff6b6b; font-size: 0.85rem; margin-top: 8px; }
    .user-info { color: #aaa; font-size: 0.85rem; margin-bottom: 5px; }
  </style>
</head>

<body>

  <header>🍔 Carioca's Sistema</header>

  <!-- LOGIN -->
  <div id="loginScreen" class="container">
    <div class="card">
      <h3>Login</h3>
      <input id="email" type="email" placeholder="Email" autocomplete="email">
      <input id="senha" type="password" placeholder="Senha" autocomplete="current-password">
      <p id="errorMsg" class="error hidden"></p>
      <button id="btnLogin" onclick="login()">Entrar</button>
      <button id="btnCadastrar" class="btn-secondary" onclick="cadastrar()">Cadastrar</button>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="hidden container">
    <div class="card">
      <h3>🎉 Bem-vindo!</h3>
      <p id="welcomeMsg" class="user-info"></p>
      <p>Sistema funcionando com sucesso 🚀</p>
      <button onclick="logout()">Sair</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // ✅ SUBSTITUA pelo seu appId completo no Firebase Console
    // Projeto > Configurações > Seus apps > appId
    const firebaseConfig = {
      apiKey: "AIzaSyD1hU802zK92ktgJqXgSiC1VlcYkEWtAQg",
      authDomain: "cariocas-app.firebaseapp.com",
      projectId: "cariocas-app",
      storageBucket: "cariocas-app.appspot.com",
      messagingSenderId: "606557023897",
      appId: "COLE_SEU_APP_ID_COMPLETO_AQUI", // ⚠️ O seu estava incompleto!
      measurementId: "G-SVEYVZ53PE"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // --- Helpers ---
    function setLoading(loading) {
      document.getElementById("btnLogin").disabled = loading;
      document.getElementById("btnCadastrar").disabled = loading;
    }

    function showError(msg) {
      const el = document.getElementById("errorMsg");
      el.textContent = msg;
      el.classList.remove("hidden");
    }

    function clearError() {
      const el = document.getElementById("errorMsg");
      el.textContent = "";
      el.classList.add("hidden");
    }

    function getFields() {
      return {
        email: document.getElementById("email").value.trim(),
        senha: document.getElementById("senha").value
      };
    }

    // --- Cadastro ---
    window.cadastrar = async function () {
      clearError();
      const { email, senha } = getFields();

      if (!email || !senha) {
        showError("Preencha email e senha.");
        return;
      }
      if (senha.length < 6) {
        showError("A senha precisa ter pelo menos 6 caracteres.");
        return;
      }

      setLoading(true);
      try {
        await createUserWithEmailAndPassword(auth, email, senha);
        alert("Cadastro realizado! Você já está logado.");
      } catch (error) {
        showError(friendlyError(error.code));
      } finally {
        setLoading(false);
      }
    };

    // --- Login ---
    window.login = async function () {
      clearError();
      const { email, senha } = getFields();

      if (!email || !senha) {
        showError("Preencha email e senha.");
        return;
      }

      setLoading(true);
      try {
        await signInWithEmailAndPassword(auth, email, senha);
      } catch (error) {
        showError(friendlyError(error.code));
      } finally {
        setLoading(false);
      }
    };

    // --- Logout ---
    window.logout = function () {
      signOut(auth);
    };

    // --- Auth state ---
    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById("loginScreen").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        document.getElementById("welcomeMsg").textContent = `Logado como: ${user.email}`;
      } else {
        document.getElementById("loginScreen").classList.remove("hidden");
        document.getElementById("app").classList.add("hidden");
      }
    });

    // --- Mensagens de erro amigáveis ---
    function friendlyError(code) {
      const errors = {
        "auth/user-not-found": "Usuário não encontrado.",
        "auth/wrong-password": "Senha incorreta.",
        "auth/invalid-email": "Email inválido.",
        "auth/email-already-in-use": "Este email já está cadastrado.",
        "auth/weak-password": "Senha muito fraca. Use ao menos 6 caracteres.",
        "auth/too-many-requests": "Muitas tentativas. Tente novamente mais tarde.",
        "auth/invalid-credential": "Credenciais inválidas. Verifique email e senha.",
        "auth/network-request-failed": "Erro de conexão. Verifique sua internet."
      };
      return errors[code] || "Ocorreu um erro. Tente novamente.";
    }
  </script>

</body>
</html>
